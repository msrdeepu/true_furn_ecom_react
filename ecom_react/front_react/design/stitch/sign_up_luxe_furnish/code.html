<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Sign Up | Luxe Furnish</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header / Nav -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 md:px-10 py-4 sticky top-0 z-50">
<div class="flex items-center gap-2 text-primary">
<div class="size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.1739 20.1739L27.8261 5.82609C29.1366 7.13663 28.3989 10.1876 26.2002 13.7654C24.8538 15.9564 22.9595 18.3449 20.6522 20.6522C18.3449 22.9595 15.9564 24.8538 13.7654 26.2002C10.1876 28.3989 7.13663 29.1366 5.82609 27.8261L20.1739 42.1739C21.4845 43.4845 24.5355 42.7467 28.1133 40.548C30.3042 39.2016 32.6927 37.3073 35 35C37.3073 32.6927 39.2016 30.3042 40.548 28.1133C42.7467 24.5355 43.4845 21.4845 42.1739 20.1739Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">Luxe Furnish</h2>
</div>
<a class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" href="/">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">close</span>
</a>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-md space-y-8 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
<!-- Welcome Text -->
<div class="text-center space-y-2">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Create Your Account</h1>
<p class="text-slate-500 dark:text-slate-400">Join our community of interior enthusiasts.</p>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all font-semibold text-slate-700 dark:text-slate-200">
<img alt="" class="h-5 w-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZnRhyPKJWEzv3HxRFNw19yzpkOqPf7IoqYV7fvLykCLK-xXYwfPvbXw1x03VSGfBJsj_pxVK2oUJXdwsOmKhJ1seMdcenZVnkjXpdd5qp9Q13rXiqk40i6dYHTJ3ACx7TLGUaqJG6jXdQhFtO0OrOEc31XZ72rIknLD1EkZYTWNrcoJUA1iL04pWrPHWOnx4Ojif3P8lgytwoNrBExZUb-z_4xM7atoDOEIvEYyw2kHi5ARoL_GE8P1qWhwqaPzrSiutJ2RzkRX03"/>
<span>Continue with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all font-semibold text-slate-700 dark:text-slate-200">
<span class="material-symbols-outlined text-xl">ios</span>
<span>Continue with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative py-2">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-400 font-bold tracking-widest">OR</span>
</div>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-5">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-4 h-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 outline-none" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-4 h-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 outline-none" placeholder="you@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-4 h-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 outline-none" placeholder="Create a strong password" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded text-primary border-slate-300 focus:ring-primary dark:bg-slate-800 dark:border-slate-700 cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-slate-500 dark:text-slate-400 leading-snug" for="terms">
                        I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold text-base shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Sign In Link -->
<div class="text-center pt-2">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="/login">Sign In</a>
</p>
</div>
</div>
</main>
<!-- Footer Decoration -->
<footer class="p-8 flex justify-center opacity-50 select-none">
<div class="flex items-center gap-6 text-slate-400 dark:text-slate-600 text-xs font-bold uppercase tracking-widest">
<span>Modern</span>
<div class="size-1 bg-slate-400 dark:bg-slate-600 rounded-full"></div>
<span>Premium</span>
<div class="size-1 bg-slate-400 dark:bg-slate-600 rounded-full"></div>
<span>Minimalist</span>
</div>
</footer>
</div>
</body></html>
